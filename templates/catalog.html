<!DOCTYPE html>
<html lang="en" xmlns:margin="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Catalogs</title>
</head>

<body style="background-color:AntiqueWhite">
<h1 style="background-color:LightBlue; text-align: center; font-size: 50px; height:65px;" > Catalog </h1>
<h4 style = "text-align: center; background-color:Azure" >
</h4>
<br>
<br>

<h2 style="background-color:LightBlue; text-align: center; font-size: 50px; height:65px;" > Please click on a category below </h2>

<!-- Below will be the code for the catalog-->
<div id="catalog" style="margin-left: 0px; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">

    {% for category in categories %}

        <form action="/catalog/{{ category }}" style="width:100%">
            <button type="submit"  class="btn btn-info" style=" width:100%; height:100%; background: midnightblue; color: white; border: 3px; border-radius: 10px; padding: 16px; text-align: center";
            onmouseover="this.style.background='white'; this.style.color='midnightblue'"  ; onmouseout="this.style.background='midnightblue'; this.style.color='white'";>

                <h5 style="margin: 0;">{{ category }}</h5>
            </button>
        </form>
    {% endfor %}
</div>

<div style="display: flex; justify-content: center; align-items: center; flex-direction: column; margin-top: 20px;">
    <form action="/welcome/">
        <button type="submit" class="btn btn-info">Go Back</button>
    </form>
</div>

<!-- Catalog code ends here-->

</body>



</html>
