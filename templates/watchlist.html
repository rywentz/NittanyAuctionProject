<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Watchlist</title>
</head>
<body style="background-color:AntiqueWhite">

<h1 style="background-color:LightBlue; text-align: center"> Watchlist </h1>

<div style="display: flex; justify-content: center; align-items: center; flex-direction: column; margin-top: 20px;">
    <form action="/welcome">
        <button type="submit" class="btn btn-info">Go Back</button>
    </form>
</div>

<div class="container mt-4">
    {% if watchlist %}
        {% for item in watchlist %}
        <div class="card mb-3">
            <div class="card-body">
                <div style="width:200px; height:200px; flex-shrink:0; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px;">
                    <img src="{{ url_for('static', filename=item[6]) }}" alt="{{ name }}" loading="lazy" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h5 class="card-title">{{ item[3] }}</h5>
                <p><b>Product Name:</b> {{ item[4] }}</p>
                <p><b>Listing #</b>{{ item[1] }}</p>
                <p><b>Category:</b> {{ item[2] }}</p>
                <p><b>Seller Email:</b> {{ item[0] }}</p>

                <form action="/remove_watchlist" method="POST">
                    <input type="hidden" name="seller_email" value="{{ item[0] }}">
                    <input type="hidden" name="listing_id" value="{{ item[1] }}">
                    <button type="submit" class="btn btn-danger">Remove from Watchlist</button>
                </form>
            </div>
        </div>
        {% endfor %}
    {% else %}
    <div class="card">
        <div class="card-body">
            <p>Your watchlist is empty.</p>
        </div>
    </div>
    {% endif %}
</div>


</body>
</html>
