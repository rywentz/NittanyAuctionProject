<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>{{ category }}</title>
</head>

<body style="background-color:AntiqueWhite">
<h1 style="background-color:LightBlue; text-align: center; font-size: 50px; height:65px;" > {{ category }} </h1>
<h4 style = "text-align: center; background-color:Azure" >
</h4>
<br>
<br>


<!--Below is the code for the blue box to the right -->
<body style="position: relative;" >

<!--<div class="rounded-box" style="border-radius:15px; background-color: dodgerblue; position: absolute; left: 25px; top: 100px; width: 300px; height: 85%;">-->
<div class="col-md-3" style="box-shadow: 3px 3px; border-radius:15px; background-color: #add8e6; position: absolute; left: 25px; top: 100px; width: 300px; height: 90%;">
    <form action="/catalog/{{ category }}">
    {% for filter in filters %}
    <div style="display: flex; align-items: center; flex-direction: row; gap: 8px; margin: 2px 0">
        <label style="display: flex; align-items: center; margin-top: 20px; margin-left: 8px; font-size: 20px; font-weight: 200">
            <input type="checkbox" name="filters" value="{{ filter }}" onchange="this.form.submit()">
            <span style="margin-left: 8px;">{{ filter }}</span>
        </label>

    </div>
    {% endfor %}
    </form>


    <div style="display: flex; justify-content: center; align-items: center; flex-direction: column; margin-top: 20px; position:absolute; left: 110px; bottom: 10%;">
        <form action="/catalog">
            <button type="submit" class="btn btn-danger">Go Back</button>
        </form>
    </div>

<form action="/catalog/{{ category }}" method="GET">
  <div class="form-group">
    <label for="user_item_lookup">Filter:</label>
    <input
      type="text"
      class="form-control"
      id="user_item_lookup"
      name="user_item_lookup"
      placeholder="Search For:"
    >
  </div>

  <button id="confirm" type="submit" class="btn btn-success">
    Search!
  </button>
</form>



</div>

</body>
<!--Blue box ends here -->


<div id="catalogtable" style="margin-left: 20%; padding-right: 200px;">

    {% for name, id, image, seller, price in product_name %}
    <div style="background: white; border: 3px; border-radius: 16px; padding: 25px; margin-bottom: 12px; display: flex; gap: 5px;"
         onmouseover="this.style.borderStyle = 'outset'"
         onmouseout="this.style.borderStyle = 'none'">

        <div style="width:200px; height:200px; flex-shrink:0; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px;">
            <img src="{{ url_for('static', filename=image) }}" alt="{{ name }}" loading="lazy" style="width: 100%; height: 100%; object-fit: contain;">
        </div>

        <div style="flex: 1;">

            <div style="font-size:30px; font-weight:500;">
                <a href="/catalog/{{ category }}/{{ name }}/{{ id }}" style="color:black;"
                   onmouseover="this.style.color='blue'"
                   onmouseout="this.style.color='black'">
                    {{ name }}
                </a>
            </div>

            <div style="font-size:18px; color:black; margin-top:2px;">Item #{{ id }}</div>

            <div style="font-size:18px; color:gray; margin-top:4px;">Seller: {{ seller }}</div>

            <div style="font-size:25px; font-weight:700; color:black; margin-top:8px;">
                US {{price}}
            </div>

            <!-- quantity here?           -->



        </div>

    </div>
    {% endfor %}

</div>




</body>


</html>
