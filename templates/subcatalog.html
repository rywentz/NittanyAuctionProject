<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>{{ category }}</title>
</head>

<body style="background-color:AntiqueWhite">
<h1 style="background-color:LightBlue; text-align: center; font-size: 50px; height:65px;" > {{ category }} </h1>
<h4 style = "text-align: center; background-color:Azure" >
</h4>
<br>
<br>


<!--Below is the code for the blue box to the right -->
<body style="position: relative;" >

<div class="rounded-box" style="border-radius:15px; background-color: dodgerblue; position: absolute; left: 25px; top: 100px; width: 300px; height: 85%;">

</div>

</body>
<!--Blue box ends here -->


<!-- Below will be the code for the catalog-->
<div id="catalog" style="margin-left:25% ; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">

    {% for item in items %}

        <form action="/catalog/{{ parent_category }}" style="width:100%">
            <button type="submit"  class="btn btn-info" style=" width:100%; height:100%; background: midnightblue; color: white; border: 3px; border-radius: 10px; padding: 16px; text-align: center";
            onmouseover="this.style.background='white'; this.style.color='midnightblue'"  ; onmouseout="this.style.background='midnightblue'; this.style.color='white'";>

                <h5 style="margin: 0;">{{ item[4] }}</h5>
            </button>
        </form>
    {% endfor %}
</div>

</body>



</html>
