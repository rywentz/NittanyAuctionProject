<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>NittanyAuction Login Page</title>
</head>


<body style="background-color:AntiqueWhite">

<h1 style="background-color:LightBlue; text-align: center"> Please enter your email and password below: </h1>

<div style="display: flex; justify-content: center; align-items: center; flex-direction: column; margin-top: 20px;">
  <form action="/login" method="POST">
    <div class="form-group">
      <label for="email">Email address:</label>
      <input type="email" class="form-control" id="email" name="email" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" class="form-control" id="password" name="password" placeholder="Password">
    </div>

    {% if error %}
      <p style="color: red; font-weight: bold;">{{ error }}</p>
    {% endif %}

    <button id="confirm" type="submit" class="btn btn-success">Login</button>
    <a href="/createaccount" class="btn btn-secondary ml-2">Create Account</a>
  </form>
</div>

</body>
</html>
