<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>NittanyAuction Account Details</title>
</head>
<body>

<body style="background-color:AntiqueWhite">

<h1 style="background-color:LightBlue; text-align: center"> Account Details </h1>

<div style="display: flex; justify-content: center; align-items: center; flex-direction: column; margin-top: 20px;">
    <form action="/welcome">
        <button type="submit" class="btn btn-info">Go Back</button>
    </form>
</div>

<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Business Information</h5>
            <hr>
            <p><b>Email:</b> {{ email }}</p>
            <p><b>Role:</b> {{ role }}</p>
            <p><b>Business:</b> {{ business }}</p>
            <p><b>Customer Service Phone:</b> {{ csphone }}</p>
            <p><b>Address:</b> {{ address }}</p>

        </div>
    </div>
</div>
<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Bank Information on File:</h5>
            <hr>
            <p><b>Account Number:</b> {{ acc_num }}</p>
            <p><b>Routing Number:</b> {{ route_num }}</p>
            <p><b>Balance:</b> {{ bal }}</p>

        </div>
    </div>
</div>


</body>
