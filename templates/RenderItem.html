<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>{{ name }}</title>
</head>

<body style="background-color:AntiqueWhite">
<h1 style="background-color:LightBlue; text-align: center"> {{ product[3] }} </h1>
<h4 style = "text-align: center; background-color:Azure" >
</h4>
<br>
<br>


<body style = "position: relative">

    <!--For image loading and display-->
    <div style="background: white; height:650px; width:650px; position: absolute; left: 100px; border: 1px; border-radius: 16px; padding: 25px; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; box-shadow: 2px 2px;">
        {% if not img_src or img_src == 'None' %}
            <div style="width:600px; height:600px; flex-shrink:0; background:gray; border-radius:4px; display:flex; align-items:center; justify-content:center; color:darkgray; font-size:25px;">
                No Image
            </div>
        {% else %}
            <!--  render image if img_src can be found through pullimage(name)   -->
            <div style="width:600px; height:600px; flex-shrink:0; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px;">
                <img src="{{ url_for('static', filename=img_src) }}" alt="{{ name }}" loading="lazy" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
        {% endif %}
    </div>


    <!--For the information box to the right of image-->
    <div style="background: white; height:650px; width:950px; position: absolute; left: 45%; border: 1px; border-radius: 16px; padding: 25px; margin-bottom: 12px; box-shadow: 2px 2px;">
        <div style="font-size:30px; color:black; margin-top:2px; font-weight:700;">{{ name }}</div>
        <hr>
        <div style="font-size:18px; color:black; margin-top:12px; font-weight:500;">Seller: {{ product[0] }}</div>

        <div style="font-size:18px; color:black; margin-top:22px; font-weight:10;">Seller's Description: {{ product[5] }}</div>
        <hr>
        <div style="font-size:46px; color:black; right:50%; margin-top:32px; font-weight:400;">US {{ product[7] }}</div>



        <div style="position: absolute; bottom:20px; width:95%">
            <hr>
            <div style="font-size:18px; color:black;">Quantity: {{ product[6] }}</div>

        </div>



    </div>




</body>

<div style="display: flex; justify-content: center; align-items: center; flex-direction: column; margin-top: 20px; position: absolute; left: 50%; bottom: 10%;">
    <form action="/catalog/{{ category }}">
        <button type="submit" class="btn btn-info">Go Back</button>
    </form>
</div>

</body>
</html>
