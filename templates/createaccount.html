<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>NittanyAuction - Create Account</title>
</head>

<body style="background-color:AntiqueWhite">

<h1 style="background-color:LightBlue; text-align: center">Create an Account</h1>

<div style="display: flex; justify-content: center; align-items: center; flex-direction: column; margin-top: 20px;">
  <form action="/createaccount" method="POST">
    <div class="form-group">
      <label for="firstname">First Name:</label>
      <input type="firstname" class="form-control" id="firstname" name="firstname" required>
    </div>
    <div class="form-group">
      <label for="lastname">Last Name:</label>
      <input type="lastname" class="form-control" id="lastname" name="lastname" required>
    </div>
    <div class="form-group">
      <label for="dob">Date of Birth:</label>
      <input type="date" class="form-control" id="dob" name="dob" required>
    </div>
    <div class="form-group">
      <label for="major">Major:</label>
      <input type="major" class="form-control" id="major" name="major" required>
    </div>
    <div class="form-group">
      <label for="streetnum">Street Number:</label>
      <input type="streetnum" class="form-control" id="streetnum" name="streetnum" required>
    </div>
    <div class="form-group">
      <label for="streetname">Street Name:</label>
      <input type="streetname" class="form-control" id="streetname" name="streetname" required>
    </div>
    <div class="form-group">
      <label for="city">City:</label>
      <input type="city" class="form-control" id="city" name="city" placeholder="State College" required>
    </div>
    <div class="form-group">
      <label for="state">State:</label>
      <input type="state" class="form-control" id="state" name="state" placeholder="PA" required>
    </div>
    <div class="form-group">
      <label for="zipcode">Zip Code:</label>
      <input type="zipcode" class="form-control" id="zipcode" name="zipcode" required>
    </div>
    <div class="form-group">
      <label for="email">Email address:</label>
      <input type="email" class="form-control" id="email" name="email" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
    </div>

    {% if error %}
      <p style="color: red; font-weight: bold;">{{ error }}</p>
    {% endif %}

    {% if success %}
      <p style="color: green; font-weight: bold;">{{ success }}</p>
    {% endif %}

    <button type="submit" class="btn btn-success">Create Account</button>
    <a href="/login" class="btn btn-danger ml-2">Back to Login</a>
  </form>
</div>

</body>
</html>
